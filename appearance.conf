env = XCURSOR_SIZE,24

cursor {
  no_hardware_cursors = true
}

general {
  gaps_in = 5
  gaps_out = 10
  border_size = 3
  col.active_border = rgba(B5A9FFFF)
  col.inactive_border = rgba(302D43EE)
}

decoration {
  rounding = 15
  rounding_power = 2

  shadow {
    enabled = true
    range = 4
    render_power = 3
    color = rgba(1a1a1aee)
  }

  blur {
    enabled = true
    size = 3
    passes = 1
    vibrancy = 0.1696
  }
}

animations {
  enabled = true
  bezier = easeOut, 0.16, 1, 0.3, 1
  animation = windows, 1, 4, easeOut, slide
  animation = workspaces, 1, 5, easeOut, slide
}
